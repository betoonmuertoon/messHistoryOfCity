<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глупов-Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="my-profile" id="my-profile">
                </div>
            <div class="friends-section">
                <h3 class="section-title">Список контактов</h3>
                <ul id="friends-list" class="friends-list">
                    </ul>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header" id="chat-header">
                <div class="header-placeholder">Выберите контакт для начала переписки</div>
            </header>
            
            <div class="chat-messages" id="chat-messages">
                </div>

            <div class="chat-input-area">
                <input type="text" placeholder="Написать сообщение (запрещено уставом)..." disabled>
                <button disabled>Отправить</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
